services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: frota_db
      POSTGRES_USER: frota_user
      POSTGRES_PASSWORD: frota_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frota_user -d frota_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env.example
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python -m scripts.seed && uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload"

  frontend:
    build: ./frontend
    ports:
      - "5175:5175"
    env_file:
      - ./frontend/.env.example
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5175"

volumes:
  pgdata:
