services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: frota_db
      POSTGRES_USER: frota_user
      POSTGRES_PASSWORD: frota_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frota_user -d frota_db"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
